<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Base64 → HTML Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #7c6aff;
      --accent2: #00e5a0;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --error: #ff5a5a;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 20px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 32px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .badge {
      font-size: 11px;
      background: #1e1e28;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      background: #0d0d0f;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 14px;
      resize: vertical;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.12);
    }

    .button-group {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 11px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.18s, transform 0.1s;
    }

    button:hover { background: #6a58e8; }
    button:active { transform: scale(0.97); }

    #open-btn {
      padding: 11px 22px;
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: none;
      align-items: center;
      gap: 6px;
      transition: background 0.18s, color 0.18s;
    }

    #open-btn:hover {
      background: var(--accent2);
      color: #0d0d0f;
    }

    #clear-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    #clear-btn:hover { background: #1e1e28; color: var(--text); }

    .error {
      margin-top: 12px;
      color: var(--error);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .preview-wrap {
      margin-top: 28px;
      display: none;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #1a1a22;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .preview-header .dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: #28ca41; }

    iframe {
      width: 100%;
      height: 85vh;
      border: 1px solid var(--border);
      border-radius: 0 0 12px 12px;
      display: block;
      background: #fff;
    }

    @media (max-width: 640px) {
      h1 { font-size: 1.4rem; }
      iframe { height: 70vh; }
      .button-group { flex-direction: column; }
      button, #open-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Base64 <span>→</span> HTML</h1>
      <span class="badge">client-side</span>
    </header>

    <div class="card">
      <textarea id="input" placeholder="Paste Base64-encoded HTML here..."></textarea>

      <div class="button-group">
        <button id="decode-btn">Decode &amp; Preview</button>
        <button id="clear-btn">Clear</button>
        <a id="open-btn" href="#" target="_blank">↗ Open in New Tab</a>
      </div>

      <div class="error" id="error" style="display:none;">
        <span>⚠</span><span id="error-msg"></span>
      </div>
    </div>

    <div class="preview-wrap" id="preview-wrap">
      <div class="preview-header">
        <div class="dots">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
        </div>
        <span>Preview</span>
        <span></span>
      </div>
      <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
    </div>
  </div>

  <script>
    const inputEl    = document.getElementById('input');
    const decodeBtn  = document.getElementById('decode-btn');
    const clearBtn   = document.getElementById('clear-btn');
    const openBtn    = document.getElementById('open-btn');
    const errorEl    = document.getElementById('error');
    const errorMsg   = document.getElementById('error-msg');
    const previewWrap = document.getElementById('preview-wrap');
    const iframe     = document.getElementById('preview');

    let blobUrl = null;

    function showError(msg) {
      errorMsg.textContent = msg;
      errorEl.style.display = 'flex';
    }

    function hideError() {
      errorEl.style.display = 'none';
    }

    decodeBtn.addEventListener('click', () => {
      hideError();
      const raw = inputEl.value.trim();

      if (!raw) {
        showError('Please paste a Base64 string first.');
        return;
      }

      let decoded;
      try {
        decoded = atob(raw);
      } catch (e) {
        showError('Invalid Base64 string.');
        return;
      }

      // Render in iframe
      iframe.srcdoc = decoded;
      previewWrap.style.display = 'block';

      // Create blob URL for "open in new tab"
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      const blob = new Blob([decoded], { type: 'text/html' });
      blobUrl = URL.createObjectURL(blob);
      openBtn.href = blobUrl;
      openBtn.style.display = 'inline-flex';
    });

    clearBtn.addEventListener('click', () => {
      inputEl.value = '';
      iframe.srcdoc = '';
      previewWrap.style.display = 'none';
      openBtn.style.display = 'none';
      hideError();
      if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
    });
  </script>
</body>
</html>
